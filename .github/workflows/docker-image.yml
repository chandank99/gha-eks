name: Kubernetes CI
on:
  push:
    branches:
      - main
jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: "docker build -t chandansingh95/gha-pyapp:${GITHUB_SHA::7} ."

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_PASSWORD }}"

      - name: Push Image to DockerHub
        run: "docker push chandansingh95/gha-pyapp:${GITHUB_SHA::7}"

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - name: Update deployment image
        #Short SHA
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          yq e ".spec.template.spec.containers[0].image = "chandansingh95/gha-pyapp:$SHORT_SHA"" -i k8s/depl.yaml
